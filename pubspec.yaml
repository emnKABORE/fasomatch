name: fasomatch
description: Fasomatch application
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.8.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  intl: ^0.19.0

  # ✅ nécessaires (d'après tes erreurs)
  intl_phone_field: ^3.2.0
  confetti: ^0.7.0
  audioplayers: ^6.0.0

  # Android only (tu l'as déjà protégé dans main.dart)
  flutter_windowmanager: ^0.2.0

  # (optionnel mais tu l’utilises dans main.dart)
  privacy_screen: ^0.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/